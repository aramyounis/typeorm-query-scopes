<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Simplified version for favicon -->
  <circle cx="16" cy="16" r="15" fill="#3178c6" opacity="0.1"/>
  
  <!-- Concentric circles -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#3178c6" stroke-width="1.5" opacity="0.4"/>
  <circle cx="16" cy="16" r="8" fill="none" stroke="#3178c6" stroke-width="1.5" opacity="0.7"/>
  <circle cx="16" cy="16" r="4" fill="none" stroke="#3178c6" stroke-width="1.5"/>
  
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="#3178c6"/>
  
  <!-- Brackets -->
  <text x="8" y="20" font-family="monospace" font-size="14" fill="#3178c6" opacity="0.3" text-anchor="middle" font-weight="bold">{</text>
  <text x="24" y="20" font-family="monospace" font-size="14" fill="#3178c6" opacity="0.3" text-anchor="middle" font-weight="bold">}</text>
</svg>
