<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Composable - Interlocking circles -->
  <circle cx="32" cy="32" r="28" fill="#3178c6" opacity="0.1"/>
  
  <!-- Three interlocking circles -->
  <circle cx="26" cy="28" r="10" fill="none" stroke="#3178c6" stroke-width="3" opacity="0.8"/>
  <circle cx="38" cy="28" r="10" fill="none" stroke="#3178c6" stroke-width="3" opacity="0.6"/>
  <circle cx="32" cy="38" r="10" fill="none" stroke="#3178c6" stroke-width="3" opacity="0.4"/>
  
  <!-- Center connection point -->
  <circle cx="32" cy="32" r="3" fill="#3178c6"/>
</svg>
